version: "3.9"

services:
  api:
    build:
      context: ./api
    ports:
      - "8080:8080"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://api:8080
    depends_on:
      - api
