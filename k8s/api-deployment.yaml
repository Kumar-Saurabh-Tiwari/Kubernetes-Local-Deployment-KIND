apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: groq-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: groq-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-secrets
                  key: GROQ_API_KEY
            - name: GROQ_MODEL
              valueFrom:
                configMapKeyRef:
                  name: groq-config
                  key: GROQ_MODEL
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
